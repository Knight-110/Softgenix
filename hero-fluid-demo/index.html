<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Fluid Cursor Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="hero" id="hero">
      <canvas id="fluid-canvas" class="hero-fluid" aria-hidden="true"></canvas>
      <div class="hero-no-webgl" id="hero-fallback" hidden>
        <div class="hero-no-webgl-glow"></div>
      </div>

      <div class="hero-content">
        <p class="eyebrow">Premium Digital Studio</p>
        <h1>We shape ideas into <span>living interfaces</span>.</h1>
        <p class="subtitle">
          Move your cursor through the hero to see a neon plasma trail with fluid swirl,
          smoky edges, and controlled color energy.
        </p>
        <div class="hero-actions">
          <a href="#" class="btn btn-primary">Start Project</a>
          <a href="#" class="btn btn-ghost">View Work</a>
        </div>
      </div>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
